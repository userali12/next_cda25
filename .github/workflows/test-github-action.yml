on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
            ~/.cache/Cypress
          key: ${{ runner.os }}-${{ github.sha }}

      - run: npm ci
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      matrix:
        browser: [chrome, edge]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/cache@v4
        with:
          path: |
            node_modules
            .next
            ~/.cache/Cypress
          key: ${{ runner.os }}-${{ github.sha }}

      - uses: cypress-io/github-action@v7
        with:
          install: false
          browser: ${{ matrix.browser }}
          start: npm run start